{% extends 'base.html' %}
{% block title %} - Profil ma'lumotlari{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Instagram Clone</div>
        <p class="auth-subtitle">Ism, username va parolni kiriting</p>

        <form id="profileForm" onsubmit="handleCompleteProfile(event)">
            <div class="form-group">
                <input type="text" id="first_name" class="form-input" placeholder="Ism" required minlength="5" maxlength="30">
            </div>
            <div class="form-group">
                <input type="text" id="last_name" class="form-input" placeholder="Familiya" required minlength="5" maxlength="30">
            </div>
            <div class="form-group">
                <input type="text" id="username" class="form-input" placeholder="Username" required minlength="5" maxlength="30">
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Parol" required minlength="8">
            </div>
            <div class="form-group">
                <input type="password" id="confirm_password" class="form-input" placeholder="Parolni tasdiqlang" required minlength="8">
            </div>
            <div id="profileError" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="profileBtn">Saqlash</button>
        </form>
    </div>
</div>
{% endblock %}
