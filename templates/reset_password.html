{% extends 'base.html' %}
{% block title %} - Yangi parol{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Instagram Clone</div>
        <p class="auth-subtitle">Yangi parol kiriting</p>

        <form id="resetForm" onsubmit="handleResetPassword(event)">
            <div class="form-group">
                <input type="password" id="new_password" class="form-input" placeholder="Yangi parol" required minlength="8">
            </div>
            <div class="form-group">
                <input type="password" id="confirm_password" class="form-input" placeholder="Parolni tasdiqlang" required minlength="8">
            </div>
            <div id="resetError" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Saqlash</button>
        </form>
    </div>
</div>
{% endblock %}
