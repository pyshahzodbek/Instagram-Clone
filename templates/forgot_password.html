{% extends 'base.html' %}
{% block title %} - Parolni tiklash{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Instagram Clone</div>
        <p class="auth-subtitle">Parolni tiklash</p>

        <form id="forgotForm" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
                <input type="text" id="email_or_phone" class="form-input" placeholder="Email yoki telefon raqam" required>
            </div>
            <div id="forgotError" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="forgotBtn">Kod yuborish</button>
        </form>

        <div class="auth-links">
            <a href="/login/" class="auth-link">Kirish sahifasiga qaytish</a>
        </div>

        <div class="auth-divider">
            <span>yoki</span>
        </div>

        <p class="auth-footer-text">
            Hisobingiz bormi?
            <a href="/login/" class="auth-link">Kirish</a>
        </p>
    </div>
</div>
{% endblock %}
