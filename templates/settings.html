{% extends 'base.html' %}
{% block title %} - Sozlamalar{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:500px;text-align:left;">
        <div class="auth-logo" style="text-align:center;font-size:20px;margin-bottom:20px;">Sozlamalar</div>

        <div class="settings-section">
            <h3 class="settings-heading">Foydalanuvchi nomini o'zgartirish</h3>
            <div id="changeUsernameError" class="error-msg" style="display:none;"></div>
            <div id="changeUsernameSuccess" class="success-msg" style="display:none;"></div>
            <div class="form-group">
                <label>Yangi username</label>
                <input type="text" id="newUsername" class="form-input" placeholder="Yangi username">
            </div>
            <div class="form-group">
                <label>Joriy parol</label>
                <input type="password" id="usernameCurrentPassword" class="form-input" placeholder="Joriy parolingiz" required>
            </div>
            <button id="changeUsernameBtn" class="btn btn-primary btn-block" onclick="handleChangeUsername()">Saqlash</button>
        </div>

        <hr style="margin:24px 0;border:none;border-top:1px solid #dbdbdb;">

        <div class="settings-section danger-zone">
            <h3 class="settings-heading" style="color:#ed4956;">Hisobni o'chirish</h3>
            <p style="font-size:13px;color:#8e8e8e;margin-bottom:12px;">Hisobingizni o'chirish orqali barcha ma'lumotlaringiz yashirinadi. Bu amalni qaytarib bo'lmaydi.</p>
            <div id="deleteAccountError" class="error-msg" style="display:none;"></div>
            <div id="deleteAccountSuccess" class="success-msg" style="display:none;"></div>
            <div class="form-group">
                <label>Parolingizni tasdiqlang</label>
                <input type="password" id="deletePassword" class="form-input" placeholder="Joriy parolingiz" required>
            </div>
            <button id="deleteAccountBtn" class="btn btn-danger btn-block" onclick="handleDeleteAccount()">Hisobni o'chirish</button>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <a href="/profile/" class="auth-link">Orqaga</a>
        </div>
    </div>
</div>
{% endblock %}
