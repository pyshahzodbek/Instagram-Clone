{% extends 'base.html' %}
{% block title %} - Kirish{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Instagram Clone</div>
        <p class="auth-subtitle">Hisobingizga kiring</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="user_input" class="form-input" placeholder="Username, email yoki telefon raqam" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Parol" required>
            </div>
            <div id="loginError" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Kirish</button>
        </form>

        <div class="auth-links">
            <a href="/forgot-password/" class="auth-link">Parolni unutdingizmi?</a>
        </div>

        <div class="auth-divider">
            <span>yoki</span>
        </div>

        <p class="auth-footer-text">
            Hisobingiz yo'qmi?
            <a href="/signup/" class="auth-link">Ro'yxatdan o'tish</a>
        </p>
    </div>
</div>
{% endblock %}
