<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar" style="display:none;">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Instagram Clone</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Bosh sahifa</a>
                <a href="/reels/" class="nav-link">Reels</a>
                <a href="/search/" class="nav-link">Qidirish</a>
                <a href="/post/new/" class="nav-link">Post yaratish</a>
                <a href="/profile/" class="nav-link">Profil</a>
                <button onclick="logoutUser()" class="nav-link logout-btn">Chiqish</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
